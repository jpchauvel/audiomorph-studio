appId: studio.audiomorph.app
productName: AudioMorph Studio
copyright: Copyright (c) 2026 AudioMorph Studio
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
  - "!**/*.map"
extraResources:
  - from: ../renderer/out
    to: renderer/out
    filter:
      - "**/*"
asar: true
mac:
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  afterPack: build/sign-python.js
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  icon: build/icon.ico
  publisherName: AudioMorph Studio
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64
linux:
  category: AudioVideo
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/installer.ico
  uninstallerIcon: build/uninstaller.ico
  include: build/installer.nsh
