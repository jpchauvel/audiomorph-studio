appId: studio.audiomorph.app
productName: AudioMorph Studio
copyright: Copyright (c) 2026 AudioMorph Studio
directories:
  # Output sits OUTSIDE the workspace tree so Next.js / Turbopack file
  # watching in apps/renderer does not have to traverse multi-GB
  # electron-builder artifacts (dmg, zip, mac-arm64 unpacked, etc.).
  # See AGENTS.md "Where to Look When..." perf notes.
  output: ../../.release-artifacts/shell
  buildResources: build
files:
  - dist/**/*
  - package.json
  - '!**/*.map'
extraResources:
  - from: ../renderer/out
    to: renderer/out
    filter:
      - '**/*'
  # Bundled CPython 3.12 + sidecar deps. Produced per host platform by
  # `node scripts/bundle-python.mjs` (invoked by dist:{mac,win,linux} scripts).
  # Directory naming matches PLATFORM_MAP in src/sidecar/manager.ts.
  - from: build/python
    to: python
    filter:
      - '**/*'
asar: true
nodeGypRebuild: false
npmRebuild: false
afterPack: build/sign-python.js
mac:
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  icon: build/icon.ico
  publisherName: AudioMorph Studio
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64
linux:
  category: AudioVideo
  synopsis: AI music generation studio
  description: Local AI music generation powered by heartlib
  icon: build/icons/
  desktop:
    Name: AudioMorph Studio
    Comment: AI music generation
    Categories: AudioVideo;Audio;Music;
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
deb:
  depends:
    - libnotify4
    - libsecret-1-0
    - libnss3
    - libxss1
    - libgtk-3-0
    - libatk-bridge2.0-0
    - libgbm1
  afterInstall: build/postinst.sh
  artifactName: audiomorph-studio_${version}_${arch}.deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/installer.ico
  uninstallerIcon: build/uninstaller.ico
  include: build/installer.nsh
