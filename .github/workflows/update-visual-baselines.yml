name: Update Visual Baselines

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to update baselines for'
        required: true
        default: 'all'
        type: choice
        options: [linux, macos, windows, all]
      branch:
        description: 'Branch to commit baselines to (default: current ref)'
        required: false
        default: ''
      reason:
        description: 'Reason for updating baselines (required for audit trail)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: visual-update-${{ inputs.branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  update-baselines:
    if: github.actor == github.repository_owner || contains(fromJSON('["MAINTAINER_USER"]'), github.actor)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            snapshot_dir: linux
          - os: macos-14
            platform: macos
            snapshot_dir: darwin
          - os: windows-latest
            platform: windows
            snapshot_dir: win32
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Skip if platform not selected
        if: inputs.platforms != 'all' && inputs.platforms != matrix.platform
        run: |
          echo "Platform ${{ matrix.platform }} not selected (input=${{ inputs.platforms }}). Exiting."
          exit 0

      - name: Checkout
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup pnpm
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Setup Node 22
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python 3.12
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install JS deps
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        run: pip install -e "apps/sidecar[dev]"

      - name: Restore HF model cache
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-${{ hashFiles('apps/sidecar/scripts/required-models.json') }}

      - name: Verify HF cache (must be pre-warmed)
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        run: node scripts/ci-hf-cache-verify.mjs

      - name: Update visual baselines
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        run: pnpm test:visual -- --update-snapshots

      - name: Commit updated baselines
        if: inputs.platforms == 'all' || inputs.platforms == matrix.platform
        run: |
          git config user.name "audiomorph-baseline-bot"
          git config user.email "bot@audiomorph.local"
          git add apps/renderer/tests/visual/__snapshots__/${{ matrix.snapshot_dir }}/
          git diff --cached --quiet || git commit -m "chore(visual): update ${{ matrix.snapshot_dir }} baselines — ${{ inputs.reason }}"
          git push origin ${{ inputs.branch || github.ref_name }}
