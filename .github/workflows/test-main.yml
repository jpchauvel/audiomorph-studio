name: Test — Main

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: false

jobs:
  main-full-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium + system deps)
        run: pnpm --filter renderer exec playwright install --with-deps chromium

      - name: Install Python deps
        run: pip install -e "apps/sidecar[dev]"

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build renderer (static export for playwright webServer)
        run: pnpm --filter renderer build

      - name: Component tests
        run: pnpm test:component

      - name: Sidecar unit tests
        run: pnpm --filter @audiomorph/sidecar test

      - name: Renderer integration tests
        run: pnpm test:integration

      - name: Sidecar integration tests
        run: pnpm test:sidecar-integration

      - name: Visual regression tests
        run: pnpm test:visual

      - name: Scrub secrets from test output
        run: pnpm scrub-secrets

      - name: Post visual diff comment
        run: node scripts/post-visual-diff-comment.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-main
          path: .test-results/*.xml
          retention-days: 14

      - name: Upload visual baselines (Linux)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-baselines-linux
          path: apps/renderer/tests/visual/__snapshots__/linux/**
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-main
          path: playwright-report/
          retention-days: 7

  main-deps-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -e "apps/sidecar[dev]"

      - name: JS dependency audit
        run: pnpm audit --audit-level=critical

      - name: Python dependency audit
        run: |
          pip install pip-audit
          # Audit the sidecar project directly from its pyproject.toml,
          # not the installed environment (which contains the local
          # editable audiomorph-sidecar package, unpublished to PyPI).
          pip-audit apps/sidecar --strict
