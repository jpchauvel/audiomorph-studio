name: Test — Nightly

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  nightly-full:
    if: github.event_name == 'workflow_dispatch' || github.repository_owner == 'OWNER'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: pip install -r apps/sidecar/requirements.txt

      - name: Restore HF model cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-${{ hashFiles('apps/sidecar/scripts/required-models.json') }}

      - name: Warm HF cache if missing
        run: node scripts/ci-hf-cache-verify.mjs || pnpm test:hf:warm

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Component tests
        run: pnpm test:component

      - name: Sidecar unit tests
        run: pnpm --filter @audiomorph/sidecar test

      - name: Renderer integration tests
        run: pnpm test:integration

      - name: Sidecar integration tests
        run: pnpm test:sidecar-integration

      - name: Visual regression tests
        run: pnpm test:visual

      - name: Smoke real engines (canary before E2E)
        run: node scripts/smoke-real-engines.mjs

      - name: Electron E2E tests
        run: pnpm test:e2e

      - name: Scrub secrets from test output
        run: pnpm scrub-secrets

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-nightly-${{ matrix.os }}
          path: .test-results/*.xml
          retention-days: 30

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-nightly-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly failure on ${{ matrix.os }} — ${new Date().toISOString().slice(0,10)}`,
              body: `Nightly CI failed on \`${{ matrix.os }}\`.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['nightly-failure']
            })
